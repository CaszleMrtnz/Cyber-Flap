<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADE - CYBER FLAP </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        body {
            margin: 0;
            background: #0d001a;
            color: #ff007f;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s;
        }

        #gameCanvas {
            border: 4px solid #7000ff;
            border-radius: 15px;
            background: #05000d;
            box-shadow: 0 0 30px rgba(112, 0, 255, 0.4);
            max-width: 95vw;
        }

        .ui-overlay {
            position: absolute;
            text-align: center;
            background: rgba(13, 0, 26, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff007f;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        #countdown-text, #level-up-text {
            position: absolute;
            font-size: 80px;
            color: #fff;
            text-shadow: 0 0 20px #ff007f;
            display: none;
            z-index: 150;
            pointer-events: none;
        }

        #level-up-text { font-size: 40px; top: 20%; }

        #pause-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: transparent;
            color: #ff007f;
            border: 2px solid #ff007f;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background: linear-gradient(45deg, #ff007f, #7000ff);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <button id="pause-btn" onclick="togglePause()">PAUSE (P)</button>
    <div id="score-display" style="font-size: 30px; margin-bottom: 10px;">SCORE: 0</div>
    
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div id="countdown-text">2</div>
    <div id="level-up-text">LEVEL UP!</div>

    <div id="menu" class="ui-overlay">
        <h1 id="menu-title">CYBER FLAP</h1>
        <p id="menu-text">GOOD LUCK FAM!</p>
        <button id="main-btn" onclick="startTimer(2)">START GAME</button>
    </div>

    <div id="pause-menu" class="ui-overlay" style="display: none;">
        <h1>GAME PAUSED</h1>
        <button onclick="startResumeTimer()">RESUME</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const levelUpDisplay = document.getElementById('level-up-text');
        const menu = document.getElementById('menu');
        const pauseMenu = document.getElementById('pause-menu');
        const countdownText = document.getElementById('countdown-text');

        let bird = { x: 50, y: 250, w: 30, h: 30, gravity: 0.6, lift: -10, velocity: 0 };
        let pipes = [];
        let frameCount = 0;
        let score = 0;
        let gameRunning = false;
        let isPaused = false;
        let inCountdown = false;

        // --- Achievement Themes ---
        const themes = [
            { score: 0, bird: "#ff007f", pipe: "#7000ff", bg: "#0d001a" }, // Default
            { score: 10, bird: "#00f2ff", pipe: "#0044ff", bg: "#000d1a" }, // Neon Blue
            { score: 20, bird: "#adff2f", pipe: "#008000", bg: "#0a1a00" }, // Acid Green
            { score: 30, bird: "#ffff00", pipe: "#ff8c00", bg: "#1a0f00" }, // Gold Rush
            { score: 40, bird: "#ffffff", pipe: "#ff0000", bg: "#1a0000" }, // Red Alert
            { score: 50, bird: "#ff00ff", pipe: "#ffffff", bg: "#1a1a1a" }  // Monochromic Pink
        ];

        let currentTheme = themes[0];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'flap') {
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'score') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function checkAchievements() {
            const newTheme = [...themes].reverse().find(t => score >= t.score);
            if (newTheme && newTheme.score !== currentTheme.score) {
                currentTheme = newTheme;
                showLevelUp();
            }
        }

        function showLevelUp() {
            levelUpDisplay.style.display = 'block';
            levelUpDisplay.style.color = currentTheme.bird;
            setTimeout(() => { levelUpDisplay.style.display = 'none'; }, 1500);
        }

        function startTimer(seconds) {
            menu.style.display = 'none';
            countdownText.style.display = 'block';
            inCountdown = true;
            let count = seconds;
            countdownText.innerText = count;
            let timer = setInterval(() => {
                count--;
                if (count > 0) countdownText.innerText = count;
                else if (count === 0) countdownText.innerText = "GO!";
                else {
                    clearInterval(timer);
                    countdownText.style.display = 'none';
                    inCountdown = false;
                    resetGame();
                }
            }, 1000);
        }

        function startResumeTimer() {
            pauseMenu.style.display = 'none';
            countdownText.style.display = 'block';
            inCountdown = true;
            let count = 2;
            countdownText.innerText = count;
            let timer = setInterval(() => {
                count--;
                if (count > 0) countdownText.innerText = count;
                else if (count === 0) countdownText.innerText = "GO!";
                else {
                    clearInterval(timer);
                    countdownText.style.display = 'none';
                    inCountdown = false;
                    isPaused = false;
                    requestAnimationFrame(update);
                }
            }, 1000);
        }

        function resetGame() {
            bird.y = 250;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
            currentTheme = themes[0];
            gameRunning = true;
            isPaused = false;
            scoreDisplay.innerText = "SCORE: 0";
            requestAnimationFrame(update);
        }

        function togglePause() {
            if (!gameRunning || inCountdown) return;
            if (!isPaused) { isPaused = true; pauseMenu.style.display = 'block'; }
            else { startResumeTimer(); }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!gameRunning && !inCountdown) startTimer(2);
                else flap();
            }
            if (e.code === 'KeyP') togglePause();
        });

        canvas.addEventListener('mousedown', flap);

        function flap() {
            if (gameRunning && !isPaused && !inCountdown) {
                bird.velocity = bird.lift;
                playSound('flap');
            }
        }

        function update() {
            if (!gameRunning || isPaused || inCountdown) return;

            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (frameCount % 90 === 0) {
                let gap = 300;
                let topH = Math.random() * (canvas.height - gap - 100) + 50;
                pipes.push({ x: canvas.width, top: topH, bottom: topH + gap, width: 50 });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 3;
                if (pipes[i].x + pipes[i].width < bird.x && !pipes[i].passed) {
                    score++;
                    scoreDisplay.innerText = "SCORE: " + score;
                    pipes[i].passed = true;
                    playSound('score');
                    checkAchievements(); // Check for theme change
                }
                if (bird.x + bird.w > pipes[i].x && bird.x < pipes[i].x + pipes[i].width &&
                    (bird.y < pipes[i].top || bird.y + bird.h > pipes[i].bottom)) gameOver();
                if (pipes[i].x < -50) pipes.splice(i, 1);
            }

            if (bird.y + bird.h > canvas.height || bird.y < 0) gameOver();

            draw();
            frameCount++;
            requestAnimationFrame(update);
        }

        function draw() {
            // Update page background based on theme
            document.body.style.backgroundColor = currentTheme.bg;

            ctx.fillStyle = "#05000d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Pipes with Theme Color
            ctx.fillStyle = currentTheme.pipe;
            ctx.shadowBlur = 15;
            ctx.shadowColor = currentTheme.pipe;
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, p.width, p.top);
                ctx.fillRect(p.x, p.bottom, p.width, canvas.height - p.bottom);
            });

            // Draw Bird with Theme Color
            ctx.fillStyle = currentTheme.bird;
            ctx.shadowBlur = 20;
            ctx.shadowColor = currentTheme.bird;
            ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            gameRunning = false;
            playSound('crash');
            menu.style.display = 'block';
            document.getElementById('menu-title').innerText = "CRASHED!";
            document.getElementById('menu-text').innerText = "FINAL SCORE: " + score;
        }
    </script>
</body>
</html>
